<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Focus Dashboard</title>
    <!-- Pemanggilan CSS dari dalam folder css -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        <!-- Dashboard Header -->
        <header>
            <div class="greeting-container">
                <h1 id="greeting-text">Hello</h1>
                <p id="date-text">Loading date...</p>
            </div>
            <!-- Perbaikan spasi pada tag button di bawah ini -->
            <button class="theme-toggle-btn" id="theme-toggle" aria-label="Toggle theme">
                <span id="theme-icon">🌙</span> <span id="theme-text">Dark Mode</span>
            </button>
        </header>

        <!-- Main Workspace Grid -->
        <main class="dashboard-grid">
            
            <!-- Focus Timer Card -->
            <section class="card focus-timer">
                <h2 class="card-title">⏱️ Focus Timer</h2>
                <div class="timer-display" id="timer-display">25:00</div>
                <div class="timer-controls">
                    <button class="btn btn-primary" id="timer-start">Start</button>
                    <button class="btn btn-secondary" id="timer-stop">Pause</button>
                    <button class="btn btn-danger" id="timer-reset">Reset</button>
                </div>
            </section>

            <!-- Quick Links Card -->
            <section class="card quick-links">
                <h2 class="card-title">🔗 Quick Links</h2>
                <form id="link-form" class="link-input-group">
                    <input type="text" id="link-name-input" placeholder="Name (e.g. GitHub)" required>
                    <input type="text" id="link-url-input" placeholder="URL (e.g. github.com)" required>
                    <button type="submit" class="btn btn-primary">Add</button>
                </form>
                <div class="links-grid" id="links-grid">
                    <!-- Quick links akan diisi otomatis lewat JS -->
                </div>
            </section>

            <!-- To-Do List Card -->
            <section class="card todo-list full-width">
                <h2 class="card-title">📝 To-Do List</h2>
                <form id="todo-form" class="todo-input-group">
                    <input type="text" id="todo-input" placeholder="Add a new task..." required>
                    <button type="submit" class="btn btn-primary">Add Task</button>
                </form>
                <ul class="todo-list-items" id="todo-list-items">
                    <!-- Tugas akan diisi otomatis lewat JS -->
                </ul>
            </section>

        </main>
    </div>

    <!-- Pemanggilan JavaScript dari dalam folder js -->
    <script src="js/app.js"></script>
</body>
</html>
