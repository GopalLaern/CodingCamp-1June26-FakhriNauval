<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Dashboard</title>
    
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- File CSS Eksternal -->
    <link rel="stylesheet" href="style.css">
    
    <!-- File JS Eksternal (defer memastikan DOM siap sebelum dieksekusi) -->
    <script src="app.js" defer></script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 min-h-screen transition-colors duration-300 flex flex-col font-sans">

    <!-- Top Navigation Header -->
    <header class="border-b border-slate-200 dark:border-slate-800 bg-white/50 dark:bg-slate-900/50 backdrop-blur-md sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 rounded-full bg-indigo-500"></div>
                <span class="font-semibold tracking-tight text-sm uppercase text-slate-500 dark:text-slate-400">Workspace</span>
            </div>
            <!-- Theme Toggle Controls -->
            <button id="theme-toggle" class="p-2 rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" aria-label="Toggle Theme">
                <!-- Moon Icon (Visible in Light Mode) -->
                <svg id="theme-moon" class="w-4.5 h-4.5 text-slate-600 dark:text-slate-400 block dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
                <!-- Sun Icon (Visible in Dark Mode) -->
                <svg id="theme-sun" class="w-4.5 h-4.5 text-slate-600 dark:text-slate-400 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m2.828 0l-.707-.707m12.728-12.728l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
                </svg>
            </button>
        </div>
    </header>

    <!-- Main Workspace Container -->
    <main class="flex-grow max-w-6xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-8">
        
        <!-- Welcome, Date & Clock Segment -->
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 sm:p-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-6 shadow-sm">
            <div>
                <p id="greeting" class="text-sm font-semibold tracking-wider text-indigo-600 dark:text-indigo-400 uppercase">Greeting</p>
                <p id="date-display" class="text-slate-500 dark:text-slate-400 text-sm mt-1">Date display</p>
            </div>
            <div class="md:text-right">
                <span id="clock" class="text-4xl sm:text-5xl font-extrabold tracking-tight tabular-nums text-slate-900 dark:text-white">00:00:00</span>
            </div>
        </div>

        <!-- Dashboard Content Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Left Side: Focus Timer and Quick Links -->
            <div class="lg:col-span-5 space-y-8">
                
                <!-- Focus Timer (Pomodoro Widget) -->
                <section class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="font-bold text-lg tracking-tight flex items-center gap-2">
                            <svg class="w-5 h-5 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            Focus Timer
                        </h2>
                        <!-- Presets -->
                        <div class="flex gap-1.5">
                            <button id="preset-work" class="px-2.5 py-1 text-xs rounded-md bg-indigo-50 dark:bg-indigo-950/40 text-indigo-600 dark:text-indigo-400 border border-indigo-100 dark:border-indigo-900/30 font-medium hover:bg-indigo-100 dark:hover:bg-indigo-900/50 transition-colors">Focus</button>
                            <button id="preset-break" class="px-2.5 py-1 text-xs rounded-md bg-slate-50 dark:bg-slate-800/50 text-slate-600 dark:text-slate-400 border border-slate-100 dark:border-slate-800 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">Break</button>
                        </div>
                    </div>
                    
                    <div class="text-center py-6">
                        <div id="timer-display" class="text-6xl font-extrabold tracking-tight tabular-nums text-slate-900 dark:text-white mb-6">25:00</div>
                        
                        <!-- Progress Bar -->
                        <div class="w-full bg-slate-100 dark:bg-slate-800 rounded-full h-1.5 mb-8 overflow-hidden">
                            <div id="timer-progress" class="bg-indigo-600 dark:bg-indigo-500 h-full rounded-full transition-all duration-300" style="width: 100%"></div>
                        </div>

                        <!-- Timer Controls -->
                        <div class="flex items-center justify-center gap-3">
                            <button id="timer-start-pause" class="flex-1 py-2.5 px-4 rounded-xl font-medium text-sm transition-all shadow-sm flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white dark:bg-indigo-500 dark:hover:bg-indigo-400">
                                <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                                <span>Start</span>
                            </button>
                            <button id="timer-reset" class="py-2.5 px-4 rounded-xl font-medium text-sm border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                                Reset
                            </button>
                        </div>
                    </div>
                </section>

                <!-- Customizable Quick Links -->
                <section class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="font-bold text-lg tracking-tight flex items-center gap-2">
                            <svg class="w-5 h-5 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
                            </svg>
                            Quick Links
                        </h2>
                        <button id="btn-open-link-modal" class="p-1.5 rounded-lg border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors" aria-label="Add new link">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                            </svg>
                        </button>
                    </div>

                    <!-- Grid Layout for Links -->
                    <div id="quick-links-grid" class="grid grid-cols-2 gap-3">
                        <!-- Links rendered dynamically via JS -->
                    </div>
                </section>

            </div>

            <!-- Right Side: Advanced To-Do List -->
            <div class="lg:col-span-7">
                <section class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-6 shadow-sm h-full flex flex-col">
                    <div class="mb-6">
                        <h2 class="font-bold text-lg tracking-tight flex items-center gap-2">
                            <svg class="w-5 h-5 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                            </svg>
                            Tasks
                        </h2>
                        <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">Manage, prioritize, and capture daily tasks.</p>
                    </div>

                    <!-- To-Do Addition Input -->
                    <form id="todo-form" class="flex gap-2 mb-6">
                        <input type="text" id="todo-input" placeholder="What is your focus next?" required autocomplete="off"
                            class="flex-1 px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
                        <button type="submit" class="px-4 py-2.5 bg-slate-900 text-white hover:bg-slate-800 dark:bg-white dark:text-slate-900 dark:hover:bg-slate-100 font-medium text-sm rounded-xl transition-all shadow-sm flex items-center gap-1">
                            Add
                        </button>
                    </form>

                    <!-- To-Do List Core -->
                    <div class="flex-grow overflow-y-auto max-h-[350px] pr-1">
                        <ul id="todo-list" class="space-y-2.5">
                            <!-- Tasks injected dynamically via JS -->
                        </ul>
                        <!-- Empty State Placeholder -->
                        <div id="todo-empty" class="hidden text-center py-12 flex flex-col items-center justify-center">
                            <svg class="w-12 h-12 text-slate-300 dark:text-slate-700 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            <p class="text-slate-500 dark:text-slate-400 text-sm">No tasks pending. Add one to begin!</p>
                        </div>
                    </div>
                </section>
            </div>

        </div>

    </main>

    <!-- Modal: Add New Quick Link -->
    <div id="link-modal" class="fixed inset-0 bg-slate-950/40 backdrop-blur-sm z-50 flex items-center justify-center hidden p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 w-full max-w-md rounded-2xl shadow-xl overflow-hidden transform scale-95 transition-transform duration-300">
            <div class="p-6 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center">
                <h3 class="font-bold text-slate-900 dark:text-white">Add Quick Link</h3>
                <button id="btn-close-link-modal" class="p-1 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <form id="link-form" class="p-6 space-y-4">
                <div>
                    <label for="link-name" class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Display Name</label>
                    <input type="text" id="link-name" placeholder="e.g. GitHub" required autocomplete="off"
                        class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
                </div>
                <div>
                    <label for="link-url" class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">URL Link</label>
                    <input type="text" id="link-url" placeholder="e.g. github.com" required autocomplete="off"
                        class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
                </div>
                <div class="flex justify-end gap-2.5 pt-2">
                    <button type="button" id="btn-cancel-link" class="px-4 py-2.5 text-sm font-medium border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-xl transition-colors">Cancel</button>
                    <button type="submit" class="px-4 py-2.5 text-sm font-medium bg-indigo-600 hover:bg-indigo-500 dark:bg-indigo-500 dark:hover:bg-indigo-400 text-white rounded-xl transition-all shadow-sm">Save Shortcut</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Persistent Bottom Footer -->
    <footer class="border-t border-slate-200 dark:border-slate-800 mt-12 py-6 bg-white dark:bg-slate-950 text-center text-xs text-slate-400 dark:text-slate-600 transition-colors">
        <div class="max-w-6xl mx-auto px-4">
            <p>Personal Dashboard SPA • Persistent Local Browser Storage</p>
        </div>
    </footer>

</body>
</html>
