<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Storage error banner -->
  <div id="storage-error-banner" class="error-banner hidden">
    ⚠️ Could not access Local Storage. Data may not be saved.
    <button class="btn-dismiss" onclick="this.parentElement.classList.add('hidden')">✕</button>
  </div>

  <div class="container">

    <!-- Section 1: Greeting & Clock -->
    <section id="greeting-section">
      <p id="greeting-text">Good Morning</p>
      <p id="current-time">--:-- --</p>
      <p id="current-date">Loading...</p>
    </section>

    <!-- Section 2: Focus Timer -->
    <section id="timer-section">
      <h2>Focus Timer</h2>
      <div id="timer-display">25:00</div>
      <div class="timer-controls">
        <button id="btn-start" class="btn btn-primary">Start</button>
        <button id="btn-stop" class="btn btn-secondary" style="display:none;">Stop</button>
        <button id="btn-reset" class="btn btn-outline">Reset</button>
      </div>
    </section>

    <!-- Section 3: To-Do List -->
    <section id="todo-section">
      <h2>To-Do List</h2>
      <div class="input-row">
        <input type="text" id="task-input" placeholder="Add a new task..." autocomplete="off" />
        <button id="btn-add-task" class="btn btn-primary">Add</button>
      </div>
      <p class="validation-msg" id="task-validation" hidden></p>
      <ul id="task-list"></ul>
      <p id="task-empty-state" class="empty-state">No tasks yet. Add one to get started!</p>
    </section>

    <!-- Section 4: Quick Links -->
    <section id="links-section">
      <h2>Quick Links</h2>
      <div class="input-row input-row--multi">
        <input type="text" id="link-name-input" placeholder="Label (e.g. GitHub)" autocomplete="off" />
        <input type="url"  id="link-url-input"  placeholder="URL (e.g. https://github.com)" autocomplete="off" />
        <button id="btn-add-link" class="btn btn-primary">Add</button>
      </div>
      <p class="validation-msg" id="link-validation" hidden></p>
      <div id="links-list"></div>
      <p id="links-empty-state" class="empty-state">No quick links yet. Add your favorites!</p>
    </section>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
