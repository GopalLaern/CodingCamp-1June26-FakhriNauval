<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Focus</title>
    <link rel="stylesheet" href="css/style.css" />
    <script>
        document.documentElement.setAttribute(
            "data-theme",
            localStorage.getItem("theme") || "light",
        );
    </script>
</head>

<body>
    <div class="container">
        <header class="card header-card">
            <button id="theme-toggle" class="theme-toggle-top">🌙</button>
            <div id="clock">00:00:00</div>
            <div id="datetime">Loading...</div>
            <div id="greeting">Good Morning</div>
        </header>

        <main class="grid">
            <div class="col-left">
                <section class="card text-center">
                    <h2 class="card-title">Focus Timer</h2>
                    <div id="timer">25:00</div>
                    <div class="timer-setup">
                        <label>Minutes:</label>
                        <input type="number" id="timer-min" value="25" min="1" max="180" />
                    </div>
                    <div class="flex-row">
                        <button id="start" class="btn btn-primary">Start</button>
                        <button id="pause" class="btn btn-secondary">Stop</button>
                        <button id="reset" class="btn btn-light">Reset</button>
                    </div>
                </section>

                <section class="card">
                    <h2 class="card-title">Quick Links</h2>
                    <form id="link-form" class="form-row">
                        <input id="link-name" placeholder="Link name" required autocomplete="off" />
                        <input id="link-url" placeholder="URL" required autocomplete="off" />
                        <button type="submit" class="btn btn-primary">Add Link</button>
                    </form>
                    <div id="links" class="links-list"></div>
                </section>
            </div>

            <div class="col-right">
                <section class="card tasks-card">
                    <h2 class="card-title">Tasks</h2>
                    <form id="todo-form" class="form-row">
                        <input id="todo-input" placeholder="Add a new task..." required autocomplete="off" />
                        <button type="submit" class="btn btn-primary">Add</button>
                    </form>
                    <ul id="todos"></ul>
                </section>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
